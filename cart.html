<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bag — VELA</title>
<link rel="stylesheet" href="style.css">
<style>
.cart-wrap {
  max-width: 1160px; margin: 0 auto;
  padding: 48px 56px 96px;
}
.cart-head { margin-bottom: 40px; }
.cart-head h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 400;
}
.cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 56px; align-items: start; }

.free-ship-bar {
  background: var(--linen); border: 1px solid var(--sand);
  padding: 14px 18px; margin-bottom: 20px; font-size: 0.82rem;
}
.fsb-track {
  width: 100%; height: 3px; background: var(--sand); margin-top: 8px; overflow: hidden;
}
.fsb-fill { height: 100%; background: var(--terracotta); transition: width 0.4s; }

.empty-bag { text-align: center; padding: 100px 0; grid-column: 1/-1; }
.empty-bag h3 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; margin-bottom: 12px; }
.empty-bag p { color: var(--stone); margin-bottom: 32px; }

/* Checkout form */
.checkout-form { margin-top: 32px; }
.checkout-form h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-group label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stone); }
.form-group input, .form-group select {
  padding: 12px 14px; border: 1.5px solid var(--sand);
  background: var(--white); font-family: 'Jost', sans-serif;
  font-size: 0.88rem; color: var(--ink); outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--terracotta); }

.checkout-btn {
  width: 100%; padding: 17px; background: var(--terracotta); color: #fff;
  border: none; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; cursor: pointer; font-family: 'Jost', sans-serif;
  transition: all 0.25s; margin-top: 6px;
}
.checkout-btn:hover { background: var(--terracotta-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(196,97,74,0.3); }

.order-confirmed {
  text-align: center; padding: 80px 24px; display: none;
}
.order-confirmed .check { font-size: 3rem; margin-bottom: 20px; display: block; }
.order-confirmed h2 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; margin-bottom: 12px; }
.order-confirmed p { color: var(--stone); margin-bottom: 32px; }

@media (max-width: 960px) {
  .cart-wrap { padding: 36px 28px 72px; }
  .cart-layout { grid-template-columns: 1fr; }
  .summary-box { position: static; }
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .cart-wrap { padding: 24px 20px 56px; }
}
</style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PPKKFMM7"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<div class="page-body">

  <div class="cart-wrap">
    <div class="cart-head">
      <span class="eyebrow">Shopping</span>
      <h1>Your Bag</h1>
    </div>

    <div id="order-confirmed" class="order-confirmed">
      <span class="check">🎉</span>
      <h2>Order Confirmed!</h2>
      <p>Thank you for shopping with VELA. You'll receive a confirmation email shortly.</p>
      <a class="btn btn-dark" href="index.html">Back to Home</a>
    </div>

    <div id="cart-main"></div>
  </div>

  <div class="newsletter">
    <h2>Stay in the Loop</h2>
    <p>New arrivals, exclusive offers, and styling tips straight to your inbox.</p>
    <div class="nl-form">
      <input class="nl-input" type="email" placeholder="Your email address">
      <button class="nl-btn" onclick="subscribeNewsletter(this)">Subscribe</button>
    </div>
  </div>

</div>
<script src="main.js"></script>
<script>
function renderCartPage() {
  const cart = getCart();
  const main = document.getElementById('cart-main');

  if (!cart.length) {
    main.innerHTML = `
      <div class="empty-bag">
        <h3>Your bag is empty</h3>
        <p>Looks like you haven't added anything yet.</p>
        <a class="btn btn-dark" href="shop.html">Start Shopping</a>
      </div>`;
    return;
  }

  const subtotal = cart.reduce((s,c)=>{
    const p = PRODUCTS.find(x=>x.id===c.id);
    return s + (p ? p.price*c.qty : 0);
  },0);
  const shipping = subtotal >= 3999 ? 0 : 299;
  const total = subtotal + shipping;
  const remaining = Math.max(0, 3999 - subtotal);
  const fillPct = Math.min(100, (subtotal/3999)*100);

  const itemsHTML = cart.map(c => {
    const p = PRODUCTS.find(x=>x.id===c.id);
    if (!p) return '';
    return `
    <div class="cart-row" id="row-${c.id}-${c.size}">
      <div class="cart-thumb" onclick="location.href='product.html?id=${p.id}'" style="cursor:pointer">
        <img src="${p.imgs[0]}" alt="${p.name}">
      </div>
      <div>
        <p class="cart-name">${p.name}</p>
        <p class="cart-sub">Size: ${c.size} &nbsp;·&nbsp; ${p.cat}</p>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty(${c.id},'${c.size}',-1)">−</button>
          <input class="qty-val" value="${c.qty}" readonly id="qv-${c.id}-${c.size}">
          <button class="qty-btn" onclick="changeQty(${c.id},'${c.size}',1)">+</button>
        </div>
        <button class="remove" onclick="doRemove(${c.id},'${c.size}')">Remove</button>
      </div>
      <div>
        <p class="cart-price">₹${(p.price*c.qty).toLocaleString()}</p>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `
  <div class="cart-layout">
    <div>
      <div class="free-ship-bar">
        ${remaining === 0
          ? `<span style="color:var(--terracotta);font-weight:600;">✓ You've unlocked free shipping!</span>`
          : `<span>Add ₹${remaining.toLocaleString()} more for free shipping</span>`}
        <div class="fsb-track"><div class="fsb-fill" style="width:${fillPct}%"></div></div>
      </div>
      ${itemsHTML}
    </div>
    <div class="summary-box">
      <h3>Order Summary</h3>
      <div class="sum-row"><span>Subtotal (${cart.reduce((s,c)=>s+c.qty,0)} items)</span><span>₹${subtotal.toLocaleString()}</span></div>
      <div class="sum-row"><span>Shipping</span><span>${shipping===0?'<span style="color:#4caf50">Free</span>':'₹'+shipping}</span></div>
      <div class="promo-row">
        <input class="promo-in" id="promoIn" placeholder="Promo code" type="text">
        <button class="promo-go" onclick="applyPromo()">Apply</button>
      </div>
      <div class="sum-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>

      <div class="checkout-form" id="checkoutForm">
        <h3>Delivery Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="Aryan">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Sharma">
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="aryan@email.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" placeholder="Flat 12, Prestige Tower">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="Bengaluru">
          </div>
          <div class="form-group">
            <label>PIN Code</label>
            <input type="text" placeholder="560001">
          </div>
        </div>
        <div class="form-group">
          <label>State</label>
          <select>
            <option>Karnataka</option><option>Maharashtra</option><option>Tamil Nadu</option>
            <option>Andhra Pradesh</option><option>Telangana</option><option>Delhi</option>
            <option>West Bengal</option><option>Gujarat</option><option>Rajasthan</option>
          </select>
        </div>
        <button class="checkout-btn" onclick="placeOrder()">Place Order — ₹${total.toLocaleString()}</button>
      </div>
    </div>
  </div>`;
}

function changeQty(id, size, delta) {
  const c = getCart(); const item = c.find(x=>x.id===id&&x.size===size);
  if (!item) return;
  item.qty = Math.max(1, item.qty+delta);
  saveCart(c);
  renderCartPage();
}

function doRemove(id, size) {
  removeFromCart(id, size);
  renderCartPage();
}

function applyPromo() {
  const val = document.getElementById('promoIn')?.value?.trim().toUpperCase();
  if (val === 'VELA10') showToast('10% discount applied! ✓', 'success');
  else showToast('Invalid promo code');
}

function placeOrder() {
  localStorage.removeItem('vela_cart');
  updateBadge();
  document.getElementById('cart-main').style.display = 'none';
  document.getElementById('order-confirmed').style.display = 'block';
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', () => {
  renderFooter();
  renderCartPage();
});
</script>
</body>
</html>
